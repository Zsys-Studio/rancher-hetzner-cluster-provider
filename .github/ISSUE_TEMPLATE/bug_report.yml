name: Bug Report
description: Report a bug with the Hetzner machine driver or UI extension
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Machine Driver
        - UI Extension
        - Both
        - Not sure
    validations:
      required: true

  - type: input
    id: rancher-version
    attributes:
      label: Rancher version
      placeholder: e.g. v2.10.3
    validations:
      required: true

  - type: input
    id: driver-version
    attributes:
      label: Driver version
      description: If this bug is not related to the machine driver (e.g. UI extension only), enter "N/A".
      placeholder: e.g. v0.9.0 or v0.0.0-dev.develop.44279ff

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: e.g. 1.0.0

  - type: textarea
    id: hetzner-details
    attributes:
      label: Hetzner details
      description: Location, server type, image, network setup, etc. (if relevant)
      placeholder: |
        Location: fsn1
        Server type: cx22
        Image: ubuntu-24.04

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or attach screenshots.
      render: shell
