name: Release

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # ─── Compute version ───
      - name: Fetch latest tags
        run: git fetch --tags --force

      - name: Compute version
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          if [ "$BRANCH" = "main" ]; then
            LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
              | grep -v '-' \
              | sort -V \
              | tail -n1)

            if [ -z "$LATEST" ]; then
              TAG="v0.1.0"
            else
              MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
              TAG="v${MAJOR}.$((MINOR + 1)).0"
            fi

            VERSION="${TAG#v}"
          else
            # develop and feature/** branches get dev pre-releases
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            # Sanitize branch name for use in tag (e.g. feature/foo → feature-foo)
            SANITIZED_BRANCH=$(echo "$BRANCH" | sed 's/[^A-Za-z0-9._-]/-/g')
            TAG="v0.0.0-dev.${SANITIZED_BRANCH}.${SHORT_SHA}"
            VERSION="0.0.0-dev.${SANITIZED_BRANCH}.${SHORT_SHA}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release: TAG=$TAG VERSION=$VERSION"

      # ─── Cleanup old dev releases ───
      # Each branch only cleans up its own dev releases to avoid interfering
      # with other branches' builds.
      - name: Delete old dev releases
        if: github.ref_name != 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Build the tag prefix for this branch (e.g. v0.0.0-dev.develop. or v0.0.0-dev.feature-foo.)
          SANITIZED_BRANCH=$(echo "$BRANCH" | sed 's/[^A-Za-z0-9._-]/-/g')
          PREFIX="v0.0.0-dev.${SANITIZED_BRANCH}."

          gh release list --limit 100 --json tagName \
            --jq ".[] | select(.tagName | startswith(\"${PREFIX}\")) | .tagName" \
          | while read -r OLD_TAG; do
            if [ "$OLD_TAG" = "$CURRENT_TAG" ]; then
              echo "Skipping current: $OLD_TAG"
              continue
            fi
            echo "Deleting: $OLD_TAG"
            gh release delete "$OLD_TAG" --yes --cleanup-tag || true
          done

      # ─── Create git tag ───
      - name: Create git tag
        run: |
          git tag -f "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" --force

      # ─── Test driver ───
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.24'
          cache-dependency-path: driver/go.sum

      - name: Test driver
        working-directory: driver
        run: make test

      # ─── Build driver with GoReleaser ───
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: '~> v2'
          args: release --clean
          workdir: driver
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}

      # ─── Build and package extension ───
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: extension/yarn.lock

      - name: Install extension dependencies
        working-directory: extension
        run: yarn install --frozen-lockfile

      - name: Install yq
        run: |
          YQ_VERSION=v4.44.6
          YQ_SHA256="0c2b24e645b57d8e7c0566d18643a6d4f5580feeea3878127354a46f2a1e4598"
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          echo "${YQ_SHA256}  /usr/local/bin/yq" | sha256sum --check
          sudo chmod +x /usr/local/bin/yq

      - name: Set extension version
        working-directory: extension/pkg/hetzner-node-driver
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          echo "Extension version set to: ${VERSION}"

      - name: Build and package extension
        working-directory: extension
        env:
          TARGET_BRANCH: ${{ github.ref_name == 'main' && 'rancher-extension' || 'rancher-extension-dev' }}
        run: yarn publish-pkgs -s zsys-studio/rancher-hetzner-cluster-provider -b ${TARGET_BRANCH} -f

      # ─── Upload extension to release ───
      - name: Upload extension to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          cd extension/dist-pkg
          TARBALL="hetzner-node-driver-${VERSION}.tgz"
          tar -czf "../${TARBALL}" -C "hetzner-node-driver-${VERSION}" .
          cd ..
          gh release upload "$TAG" "$TARBALL" --clobber

      # ─── Publish extension to Helm repo branch ───
      - name: Publish extension to rancher-extension
        if: github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@e9c66a37f080288a11235e32cbe2dc5fb3a679cc # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: rancher-extension
          publish_dir: extension/tmp
          keep_files: true

      - name: Publish extension to rancher-extension-dev
        if: github.ref_name != 'main'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PKG="hetzner-node-driver"
          TARGET_BRANCH="rancher-extension-dev"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch or create target branch
          if git ls-remote --exit-code --heads origin "${TARGET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${TARGET_BRANCH}"
            git worktree add /tmp/ext "origin/${TARGET_BRANCH}"
          else
            git switch --orphan "${TARGET_BRANCH}"
            touch .nojekyll
            git add .nojekyll
            git commit -m "Initialize ${TARGET_BRANCH}"
            git push origin "${TARGET_BRANCH}"
            git switch -
            git fetch origin "${TARGET_BRANCH}"
            git worktree add /tmp/ext "origin/${TARGET_BRANCH}"
          fi

          cd /tmp/ext

          # Copy new build
          cp -r "${GITHUB_WORKSPACE}/extension/tmp"/* .

          # Prune to keep only the 10 most recent dev versions.
          DEV_COUNT=$(yq '.entries["hetzner-node-driver"] | map(select(.version | test("-dev"))) | length' index.yaml)
          echo "Dev versions in index: ${DEV_COUNT}"

          if [ "$DEV_COUNT" -gt 10 ]; then
            # 1) Get old dev versions to remove (sorted by created, drop newest 10)
            OLD_VERSIONS=$(yq -r '
              .entries["hetzner-node-driver"]
              | map(select(.version | test("-dev")))
              | sort_by(.created)
              | .[:-10]
              | .[].version
            ' index.yaml)

            # 2) Delete files for old versions
            for v in $OLD_VERSIONS; do
              rm -rf "extensions/${PKG}/${v}" "charts/${PKG}/${v}"
              rm -f "assets/${PKG}/${PKG}-${v}.tgz" "extensions/${PKG}/${v}.tgz"
            done

            # 3) Keep only non-dev entries + newest 10 dev entries in index
            yq -i '
              .entries["hetzner-node-driver"] |= (
                map(select(.version | test("-dev") | not)) +
                (map(select(.version | test("-dev"))) | sort_by(.created) | .[-10:])
              )
            ' index.yaml
          else
            echo "Skipping prune — only ${DEV_COUNT} dev version(s), threshold is 10"
          fi

          git add -A
          git commit -m "Publish extension ${VERSION}" || true
          git push origin HEAD:"${TARGET_BRANCH}"
